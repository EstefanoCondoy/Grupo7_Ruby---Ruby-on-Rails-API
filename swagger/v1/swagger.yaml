openapi: 3.0.3
info:
  title: E-Commerce API — Grupo 7
  description: |
    API RESTful de E-commerce construida con Ruby on Rails 7.1 (API mode).
    
    **Integrantes:** Estéfano Condoy, Eddy Sangucho, César Zapata
    
    ## Autenticación
    La API utiliza JWT (JSON Web Tokens). Para acceder a endpoints protegidos:
    1. Registra un usuario en `POST /api/v1/users/register`
    2. Inicia sesión en `POST /api/v1/users/login` para obtener un token
    3. Incluye el token en el header: `Authorization: Bearer <token>`
    
    ## Reglas de Negocio
    - El **total del recibo** se calcula automáticamente en el backend
    - El **stock** se valida y descuenta automáticamente al crear un recibo
    - Las **contraseñas** se cifran con BCrypt y nunca se exponen en respuestas
    - Los **montos monetarios** usan `decimal(10,2)` para precisión
  version: 1.0.0
  contact:
    name: Grupo 7 - Estéfano Condoy, Eddy Sangucho, César Zapata

servers:
  - url: http://localhost:3000
    description: Servidor de desarrollo

tags:
  - name: Users
    description: Gestión de usuarios y autenticación
  - name: Products
    description: Gestión de productos del catálogo
  - name: Receipts
    description: Gestión de recibos y órdenes de compra

paths:
  /api/v1/users/register:
    post:
      tags: [Users]
      summary: Registrar nuevo usuario
      description: Crea un nuevo usuario con contraseña cifrada mediante BCrypt
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  required: [first_name, last_name, email, password]
                  properties:
                    first_name:
                      type: string
                      maxLength: 50
                      example: Juan
                    last_name:
                      type: string
                      maxLength: 50
                      example: Pérez
                    email:
                      type: string
                      format: email
                      example: juan@example.com
                    password:
                      type: string
                      minLength: 6
                      example: password123
      responses:
        '201':
          description: Usuario registrado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Error de validación (email duplicado, datos faltantes, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/users/login:
    post:
      tags: [Users]
      summary: Iniciar sesión
      description: Autentica al usuario y retorna un JWT válido por 24 horas
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: juan@example.com
                password:
                  type: string
                  example: password123
      responses:
        '200':
          description: Login exitoso — retorna datos del usuario y JWT
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    allOf:
                      - $ref: '#/components/schemas/User'
                      - type: object
                        properties:
                          token:
                            type: string
                            description: JWT token válido por 24 horas
                            example: eyJhbGciOiJIUzI1NiJ9.eyJ1c2VyX2lkIjoxLCJleHAiOjE3MjE4NjAwMDB9...
        '401':
          description: Credenciales inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/users/{id}:
    get:
      tags: [Users]
      summary: Obtener usuario por ID
      operationId: getUserById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: No autorizado — token ausente o inválido
        '404':
          description: Usuario no encontrado
    put:
      tags: [Users]
      summary: Actualizar usuario
      operationId: updateUser
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    first_name:
                      type: string
                      example: Juan Carlos
                    last_name:
                      type: string
                      example: Pérez López
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                      minLength: 6
      responses:
        '200':
          description: Usuario actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: No autorizado
        '404':
          description: Usuario no encontrado
        '422':
          description: Error de validación
    delete:
      tags: [Users]
      summary: Eliminar usuario
      operationId: deleteUser
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Usuario eliminado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Usuario eliminado exitosamente
        '401':
          description: No autorizado
        '404':
          description: Usuario no encontrado

  /api/v1/products:
    get:
      tags: [Products]
      summary: Listar productos (con paginación y búsqueda)
      description: Retorna productos paginados. Permite filtrar por nombre con búsqueda parcial (ILIKE).
      operationId: listProducts
      parameters:
        - name: page
          in: query
          description: Número de página
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          description: Productos por página
          schema:
            type: integer
            default: 10
        - name: name
          in: query
          description: Filtrar por nombre (búsqueda parcial, case-insensitive)
          schema:
            type: string
          example: laptop
      responses:
        '200':
          description: Lista de productos paginada
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
                  meta:
                    $ref: '#/components/schemas/Pagination'
    post:
      tags: [Products]
      summary: Crear producto
      operationId: createProduct
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                product:
                  type: object
                  required: [name, price, stock]
                  properties:
                    name:
                      type: string
                      maxLength: 100
                      example: Laptop Gaming
                    description:
                      type: string
                      maxLength: 500
                      example: Laptop de alta gama para gaming
                    price:
                      type: number
                      format: decimal
                      minimum: 0.01
                      example: 1299.99
                    stock:
                      type: integer
                      minimum: 0
                      example: 15
      responses:
        '201':
          description: Producto creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '401':
          description: No autorizado
        '422':
          description: Error de validación

  /api/v1/products/{id}:
    get:
      tags: [Products]
      summary: Obtener producto por ID
      operationId: getProductById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Producto encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          description: Producto no encontrado
    put:
      tags: [Products]
      summary: Actualizar producto
      operationId: updateProduct
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                product:
                  type: object
                  properties:
                    name:
                      type: string
                    description:
                      type: string
                    price:
                      type: number
                      format: decimal
                    stock:
                      type: integer
      responses:
        '200':
          description: Producto actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '401':
          description: No autorizado
        '404':
          description: Producto no encontrado
        '422':
          description: Error de validación
    delete:
      tags: [Products]
      summary: Eliminar producto
      operationId: deleteProduct
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Producto eliminado exitosamente
        '401':
          description: No autorizado
        '404':
          description: Producto no encontrado

  /api/v1/receipts:
    get:
      tags: [Receipts]
      summary: Listar todos los recibos
      operationId: listReceipts
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de recibos con sus items
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Receipt'
        '401':
          description: No autorizado
    post:
      tags: [Receipts]
      summary: Crear recibo (el total se calcula en el backend)
      description: |
        Crea un nuevo recibo de compra. El cliente envía únicamente el `user_id` y una lista de items con `product_id` y `quantity`.
        
        El backend automáticamente:
        - **Valida** que los productos existan
        - **Verifica** stock disponible para cada producto
        - **Calcula** `unit_price` (precio actual del producto), `subtotal` (price × quantity) y `total`
        - **Descuenta** el stock de cada producto
        
        Si algún producto no tiene stock suficiente, la transacción completa se revierte.
      operationId: createReceipt
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                receipt:
                  type: object
                  required: [user_id, items]
                  properties:
                    user_id:
                      type: integer
                      description: ID del usuario que realiza la compra
                      example: 1
                    items:
                      type: array
                      minItems: 1
                      description: Lista de productos y cantidades a comprar
                      items:
                        type: object
                        required: [product_id, quantity]
                        properties:
                          product_id:
                            type: integer
                            description: ID del producto
                            example: 1
                          quantity:
                            type: integer
                            minimum: 1
                            description: Cantidad a comprar
                            example: 2
      responses:
        '201':
          description: Recibo creado exitosamente con total calculado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceiptResponse'
        '401':
          description: No autorizado
        '404':
          description: Usuario o producto no encontrado
        '409':
          description: Stock insuficiente para uno o más productos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Error de validación (sin items, cantidad inválida, etc.)

  /api/v1/receipts/{id}:
    get:
      tags: [Receipts]
      summary: Obtener recibo por ID
      operationId: getReceiptById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Recibo encontrado con todos sus items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReceiptResponse'
        '401':
          description: No autorizado
        '404':
          description: Recibo no encontrado
    delete:
      tags: [Receipts]
      summary: Eliminar recibo
      operationId: deleteReceipt
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Recibo eliminado exitosamente
        '401':
          description: No autorizado
        '404':
          description: Recibo no encontrado

  /api/v1/receipts/user/{user_id}:
    get:
      tags: [Receipts]
      summary: Listar recibos por usuario
      operationId: getReceiptsByUser
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Recibos del usuario encontrados
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Receipt'
        '401':
          description: No autorizado
        '404':
          description: Usuario no encontrado

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT obtenido del endpoint POST /api/v1/users/login.
        Incluir como: Authorization: Bearer <token>

  schemas:
    User:
      type: object
      description: Representación del usuario (sin contraseña)
      properties:
        id:
          type: integer
          example: 1
        firstName:
          type: string
          example: Juan
        lastName:
          type: string
          example: Pérez
        email:
          type: string
          format: email
          example: juan@example.com
        createdAt:
          type: string
          format: date-time
          example: "2026-07-17T12:00:00-05:00"
        updatedAt:
          type: string
          format: date-time
          example: "2026-07-17T12:00:00-05:00"

    UserResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/User'

    Product:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Laptop HP Pavilion
        description:
          type: string
          example: Laptop HP Pavilion 15.6" Intel Core i5 16GB RAM
        price:
          type: number
          format: decimal
          example: 899.99
        stock:
          type: integer
          example: 25
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProductResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/Product'

    Receipt:
      type: object
      description: Recibo de compra con total calculado por el backend
      properties:
        id:
          type: integer
          example: 1
        userId:
          type: integer
          example: 1
        user:
          type: object
          properties:
            id:
              type: integer
              example: 1
            firstName:
              type: string
              example: Juan
            lastName:
              type: string
              example: Pérez
            email:
              type: string
              example: juan@example.com
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReceiptItem'
        total:
          type: number
          format: decimal
          description: Total calculado automáticamente por el backend
          example: 1929.97
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ReceiptResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/Receipt'

    ReceiptItem:
      type: object
      description: Detalle de un item dentro del recibo
      properties:
        id:
          type: integer
          example: 1
        productId:
          type: integer
          example: 1
        productName:
          type: string
          example: Laptop HP Pavilion
        quantity:
          type: integer
          example: 2
        unitPrice:
          type: number
          format: decimal
          description: Precio del producto al momento de la compra
          example: 899.99
        subtotal:
          type: number
          format: decimal
          description: unitPrice × quantity
          example: 1799.98

    Pagination:
      type: object
      description: Metadatos de paginación
      properties:
        currentPage:
          type: integer
          example: 1
        totalPages:
          type: integer
          example: 3
        totalCount:
          type: integer
          example: 25
        perPage:
          type: integer
          example: 10

    ErrorResponse:
      type: object
      description: Respuesta de error estandarizada
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: Error de validación
        message:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          example: "Stock insuficiente para 'Laptop HP'. Disponible: 25, Solicitado: 999"
        status:
          type: integer
          example: 422
        timestamp:
          type: string
          format: date-time
          example: "2026-07-17T12:00:00-05:00"
